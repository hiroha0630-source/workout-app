<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="体重とトレーニングだけを記録する、いちばんシンプルな筋トレ・ダイエット記録アプリ。データはCSVでエクスポートでき、成果の証明に使えます。">
<meta name="theme-color" content="#faf6f2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23f0705a'/><text x='50' y='66' font-size='44' font-weight='bold' fill='white' text-anchor='middle' font-family='sans-serif'>LL</text></svg>">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>WORKOUT LOGLOG - シンプル筋トレ・ダイエット記録</title>
<style>
  :root {
    --bg: #faf6f2;
    --surface: #ffffff;
    --surface-2: #f5ede7;
    --border: #eee2d9;
    --text: #443931;
    --muted: #a5958a;
    --accent: #f0705a;
    --accent-dim: #d95c47;
    --accent-soft: #ffb199;
    --green: #4caf7d;
    --blue: #4da3a3;
    --red: #e05555;
    --radius: 16px;
    --shadow: 0 2px 12px rgba(190, 150, 125, .10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding-bottom: 90px;
  }
  header {
    padding: 20px 16px 12px;
    position: sticky; top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .logo { display: flex; flex-direction: column; line-height: 1.05; }
  .logo .logo-top { font-size: 11px; font-weight: 600; letter-spacing: .38em; color: var(--muted); }
  .logo .logo-main {
    font-size: 27px; font-weight: 800; letter-spacing: .05em;
    background: linear-gradient(90deg, var(--accent), var(--accent-soft));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  header .date { color: var(--muted); font-size: 13px; margin-top: 4px; }
  main { padding: 0 16px; max-width: 640px; margin: 0 auto; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .card h2 { font-size: 15px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }

  .exercise {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 14px;
    overflow: hidden;
    transition: border-color .2s;
    box-shadow: var(--shadow);
  }
  .exercise.done { border-color: var(--green); }
  .ex-head {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; cursor: pointer;
  }
  .ex-check {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--border); flex-shrink: 0;
    display: grid; place-items: center; font-size: 15px;
    transition: all .2s;
  }
  .exercise.done .ex-check { background: var(--green); border-color: var(--green); }
  .ex-title { flex: 1; font-weight: 600; font-size: 16px; }
  .exercise.done .ex-title { color: var(--muted); text-decoration: line-through; }
  .ex-sub { font-size: 12px; color: var(--muted); font-weight: 400; }
  .ex-del { color: var(--muted); font-size: 20px; padding: 4px 8px; }

  .arm { color: var(--red) !important; font-size: 13px !important; font-weight: 700; }

  .sets { padding: 0 16px 14px; }
  .set-row {
    display: grid; grid-template-columns: 28px 1fr 1fr 34px; gap: 8px;
    align-items: center; margin-bottom: 8px;
  }
  .set-num { font-size: 13px; color: var(--muted); text-align: center; }
  .set-row input {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 9px; color: var(--text); padding: 9px 10px;
    font-size: 15px; width: 100%; text-align: center;
  }
  .set-row input:focus { outline: none; border-color: var(--accent); }
  .set-del { color: var(--muted); text-align: center; font-size: 18px; padding: 4px; }
  .set-labels { display: grid; grid-template-columns: 28px 1fr 1fr 34px; gap: 8px; margin-bottom: 6px; }
  .set-labels span { font-size: 11px; color: var(--muted); text-align: center; }
  .btn-set {
    width: 100%; background: var(--surface-2); border: 1px dashed var(--border);
    color: var(--muted); padding: 9px; border-radius: 9px; font-size: 13px;
    cursor: pointer; margin-top: 4px;
  }

  button { font-family: inherit; }

  .add-form { display: flex; gap: 8px; margin-bottom: 16px; }
  .add-form input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); padding: 13px 14px; font-size: 15px;
    min-width: 0;
  }
  .add-form input:focus { outline: none; border-color: var(--accent); }
  .add-form button {
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
    padding: 0 18px; font-size: 22px; font-weight: 600; cursor: pointer; flex-shrink: 0;
  }

  .empty { text-align: center; color: var(--muted); padding: 50px 20px; }
  .empty .big { font-size: 40px; margin-bottom: 10px; }

  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 10px; text-align: center; box-shadow: var(--shadow); }
  .stat .num { font-size: 24px; font-weight: 700; color: var(--accent); }
  .stat .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .hist-day { margin-bottom: 8px; }
  .hist-date { font-size: 13px; color: var(--blue); font-weight: 600; margin-bottom: 6px; display: flex; justify-content: space-between; }
  .hist-ex { font-size: 14px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .hist-ex:last-child { border: none; }
  .hist-ex .sets-txt { color: var(--muted); font-size: 12px; }

  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-label { font-size: 11px; color: var(--muted); width: 44px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 22px; background: var(--surface-2); border-radius: 6px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-soft), var(--accent)); border-radius: 6px; }
  .bar-val { font-size: 11px; color: var(--text); width: 60px; text-align: right; flex-shrink: 0; }

  nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; padding: 6px 0 max(6px, env(safe-area-inset-bottom));
    z-index: 20;
    box-shadow: 0 -4px 16px rgba(190, 150, 125, .12);
  }
  nav button {
    flex: 1; background: none; border: none; color: var(--muted);
    padding: 8px 0; font-size: 11px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  nav button .ico { font-size: 20px; }
  nav button.active { color: var(--accent); }

  .tab { display: none; }
  .tab.active { display: block; }
  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: var(--green); color: #fff; padding: 10px 20px; border-radius: 30px;
    font-size: 14px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 50;
    max-width: 90vw; text-align: center;
  }
  .toast.show { opacity: 1; }

  .templates { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .templates button {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);
    padding: 7px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;
  }

  .weight-row { display: flex; align-items: center; gap: 10px; }
  .weight-row input {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 9px; color: var(--text); padding: 10px 12px;
    font-size: 18px; font-weight: 600; width: 110px; text-align: center;
  }
  .weight-row input:focus { outline: none; border-color: var(--blue); }
  .weight-unit { color: var(--muted); font-size: 14px; }
  .weight-diff { font-size: 13px; margin-left: auto; }
  .weight-diff.down { color: var(--green); }
  .weight-diff.up { color: var(--accent); }

  /* 目標カード */
  .goal-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .goal-head .big { font-size: 18px; font-weight: 700; }
  .goal-head .big span { color: var(--accent); }
  .goal-sub { font-size: 12px; color: var(--muted); }
  .progress-track { height: 12px; background: var(--surface-2); border-radius: 8px; overflow: hidden; margin: 8px 0 6px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-soft), var(--accent)); border-radius: 8px; transition: width .4s; }
  .goal-foot { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); }

  /* 設定 */
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .field input {
    width: 100%; background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 9px; color: var(--text); padding: 11px 12px; font-size: 15px;
    color-scheme: light;
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-primary {
    width: 100%; background: var(--accent); color: #fff; border: none;
    padding: 13px; border-radius: 11px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .btn-primary:active { background: var(--accent-dim); }
  .btn-ghost {
    width: 100%; background: var(--surface-2); color: var(--text); border: 1px solid var(--border);
    padding: 12px; border-radius: 11px; font-size: 14px; cursor: pointer; margin-bottom: 8px;
    text-align: left;
  }
  .btn-danger { color: var(--red); border-color: rgba(255,92,92,.35); }
  .tpl-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 0;
    border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .tpl-item:last-of-type { border-bottom: none; }
  .tpl-item .tpl-name { font-weight: 600; }
  .tpl-item .tpl-ex { flex: 1; color: var(--muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tpl-item .tpl-del { color: var(--muted); font-size: 17px; padding: 2px 6px; cursor: pointer; }
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-row input { width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer; }
  .ver { text-align: center; color: var(--muted); font-size: 11px; padding: 8px 0 20px; }
</style>
</head>
<body>
<header>
  <h1 class="logo"><span class="logo-top">WORK OUT</span><span class="logo-main">LOGLOG</span></h1>
  <div class="date" id="todayLabel"></div>
</header>

<main>
  <!-- 今日 -->
  <section class="tab active" id="tab-today">
    <div class="card" id="goalCard" style="display:none"></div>
    <div class="card" id="weightCard">
      <h2>⚖️ 今日の体重</h2>
      <div class="weight-row">
        <input type="number" inputmode="decimal" step="0.1" id="weightInput" placeholder="0.0">
        <span class="weight-unit">kg</span>
        <span class="weight-diff" id="weightDiff"></span>
      </div>
    </div>
    <div class="templates" id="templates"></div>
    <div class="add-form">
      <input type="text" id="exInput" placeholder="種目を追加（例: ベンチプレス）" autocomplete="off">
      <button id="addExBtn">＋</button>
    </div>
    <div id="exList"></div>
  </section>

  <!-- 記録 -->
  <section class="tab" id="tab-history">
    <div class="stats-grid" id="statsGrid"></div>
    <div id="histList"></div>
  </section>

  <!-- 統計 -->
  <section class="tab" id="tab-stats">
    <div class="card">
      <h2>⚖️ 体重の推移</h2>
      <div id="weightChart"></div>
    </div>
    <div class="card">
      <h2>週間トレーニング量 (総重量)</h2>
      <div id="volumeChart"></div>
    </div>
    <div class="card">
      <h2>種目別ベスト記録 (最大重量)</h2>
      <div id="prList"></div>
    </div>
  </section>

  <!-- 設定 -->
  <section class="tab" id="tab-settings">
    <div class="card">
      <h2>🎯 目標（例: 3ヶ月で −10kg）</h2>
      <div class="row-2">
        <div class="field"><label>開始体重 (kg)</label><input type="number" inputmode="decimal" step="0.1" id="goalStart" placeholder="72.0"></div>
        <div class="field"><label>目標体重 (kg)</label><input type="number" inputmode="decimal" step="0.1" id="goalTarget" placeholder="62.0"></div>
      </div>
      <div class="field"><label>期限</label><input type="date" id="goalDate"></div>
      <button class="btn-primary" id="goalSave">目標を保存</button>
      <button class="btn-ghost btn-danger" id="goalDelete" style="margin-top:8px;text-align:center;display:none">目標を削除</button>
    </div>

    <div class="card">
      <h2>🧩 クイックメニュー（ワンタップで種目を一括追加）</h2>
      <div id="tplList"></div>
      <div class="field" style="margin-top:10px"><label>メニュー名</label><input type="text" id="tplName" placeholder="例: 胸の日"></div>
      <div class="field"><label>種目（カンマ区切り）</label><input type="text" id="tplExercises" placeholder="例: ベンチプレス, チェストフライ"></div>
      <button class="btn-primary" id="tplAdd">メニューを追加</button>
    </div>

    <div class="card">
      <h2>👁 機能のオン / オフ</h2>
      <div class="toggle-row"><span>⚖️ 体重の記録</span><input type="checkbox" id="prefWeight"></div>
      <div class="toggle-row"><span>🧩 クイックメニューのボタン</span><input type="checkbox" id="prefTemplates"></div>
      <div class="toggle-row"><span>🎯 目標カード（今日タブ）</span><input type="checkbox" id="prefGoal"></div>
    </div>

    <div class="card">
      <h2>💾 データ（エクスポート・バックアップ）</h2>
      <button class="btn-ghost" id="expCsv">📊 CSVをダウンロード（Excel対応・全記録）</button>
      <button class="btn-ghost" id="expReport">📄 進捗レポートをコピー（SNS・販売用）</button>
      <button class="btn-ghost" id="expJson">🗂 バックアップを保存（JSON）</button>
      <button class="btn-ghost" id="impJson">📥 バックアップから復元</button>
      <input type="file" id="impFile" accept=".json,application/json" style="display:none">
      <button class="btn-ghost btn-danger" id="wipeAll">🗑 全データを削除</button>
    </div>
    <div class="ver">WORKOUT LOGLOG v1.1 ・ データはこの端末にのみ保存されます</div>
  </section>
</main>

<nav>
  <button class="active" data-tab="today"><span class="ico">🏋️‍♀️</span>今日</button>
  <button data-tab="history"><span class="ico">📋</span>記録</button>
  <button data-tab="stats"><span class="ico">📊</span>統計</button>
  <button data-tab="settings"><span class="ico">⚙️</span>設定</button>
</nav>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ---- storage (サンドボックス等 localStorage 不可の環境はメモリ保存にフォールバック) ----
const storage = (() => {
  try {
    localStorage.setItem('__t', '1'); localStorage.removeItem('__t');
    return localStorage;
  } catch (e) {
    const mem = {};
    return { getItem: k => mem[k] ?? null, setItem: (k, v) => { mem[k] = v; }, removeItem: k => { delete mem[k]; } };
  }
})();
function load(key, fallback) {
  try { const v = storage.getItem(key); return v ? JSON.parse(v) : JSON.parse(JSON.stringify(fallback)); }
  catch (e) { return JSON.parse(JSON.stringify(fallback)); }
}
function persist(key, val) { try { storage.setItem(key, JSON.stringify(val)); } catch (e) {} }

// ---- state ----
const DEFAULT_TEMPLATES = [
  { name: '胸の日', ex: ['ベンチプレス', 'インクラインダンベルプレス', 'チェストフライ'] },
  { name: '背中の日', ex: ['デッドリフト', '懸垂', 'ラットプルダウン'] },
  { name: '脚の日', ex: ['スクワット', 'レッグプレス', 'カーフレイズ'] },
  { name: '有酸素の日', ex: ['ウォーキング', 'バイク'] }
];
let data = load('workoutData_v1', {});        // { "YYYY-MM-DD": [ {id, name, done, sets:[{w,r}]} ] }
let weightData = load('weightData_v1', {});   // { "YYYY-MM-DD": "65.2" }
let goal = load('goal_v1', null);             // { start, target, date, set } | null
let templates = load('templates_v1', DEFAULT_TEMPLATES);
let prefs = load('prefs_v1', { weight: true, templates: true, goal: true });

const save = () => persist('workoutData_v1', data);
const saveWeight = () => persist('weightData_v1', weightData);

// ---- date helpers (ローカル時刻基準。toISOString はUTCで日本では朝9時まで前日にズレる) ----
const dateKey = d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
const todayKey = () => dateKey(new Date());
function fmtDate(k) {
  const d = new Date(k + 'T00:00:00');
  const wd = ['日','月','火','水','木','金','土'][d.getDay()];
  return `${d.getMonth() + 1}月${d.getDate()}日 (${wd})${k === todayKey() ? ' ・ 今日' : ''}`;
}
function fmtDateShort(k) {
  const d = new Date(k + 'T00:00:00');
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

// ---- misc helpers ----
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 1800);
}
// 誤タップ防止: 1回目で「削除?」表示、2回目で実行 (confirm はサンドボックスで動かないため不使用)
function armDelete(el, onConfirm) {
  if (el.dataset.armed) { delete el.dataset.armed; onConfirm(); return; }
  el.dataset.armed = '1';
  const orig = el.textContent;
  el.classList.add('arm'); el.textContent = '削除?';
  setTimeout(() => { delete el.dataset.armed; el.classList.remove('arm'); el.textContent = orig; }, 2200);
}
function todayList() {
  if (!data[todayKey()]) data[todayKey()] = [];
  return data[todayKey()];
}
function exVolume(ex) {
  return ex.sets.reduce((s, set) => s + (parseFloat(set.w) || 0) * (parseFloat(set.r) || 0), 0);
}
function latestWeight() {
  const ks = Object.keys(weightData).filter(k => parseFloat(weightData[k]) > 0).sort();
  return ks.length ? { k: ks[ks.length - 1], v: parseFloat(weightData[ks[ks.length - 1]]) } : null;
}

// ---- 目標カード ----
function renderGoalCard() {
  const card = document.getElementById('goalCard');
  if (!goal || !prefs.goal) { card.style.display = 'none'; return; }
  card.style.display = '';
  const lw = latestWeight();
  const cur = lw ? lw.v : goal.start;
  const total = goal.start - goal.target;
  const done = goal.start - cur;
  const pct = total !== 0 ? Math.max(0, Math.min(1, done / total)) : 0;
  const remain = +(cur - goal.target).toFixed(1);
  const daysLeft = Math.ceil((new Date(goal.date + 'T00:00:00') - new Date(todayKey() + 'T00:00:00')) / 86400000);
  const achieved = total > 0 ? cur <= goal.target : cur >= goal.target;
  let headline;
  if (achieved) headline = `🎉 目標達成！ <span>${goal.target}kg</span>`;
  else headline = `🎯 <span>${goal.target}kg</span> まで あと ${Math.abs(remain).toFixed(1)}kg`;
  card.innerHTML = `
    <div class="goal-head"><div class="big">${headline}</div><div class="goal-sub">${Math.round(pct * 100)}%</div></div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct * 100}%"></div></div>
    <div class="goal-foot">
      <span>${goal.start}kg → 現在 ${cur}kg（${done >= 0 ? '−' : '+'}${Math.abs(done).toFixed(1)}kg）</span>
      <span>${daysLeft >= 0 ? '残り ' + daysLeft + '日' : '期限超過'}</span>
    </div>`;
}

// ---- 体重 ----
function prevWeightEntry(beforeKey) {
  const keys = Object.keys(weightData).filter(k => k < beforeKey && parseFloat(weightData[k]) > 0).sort();
  return keys.length ? { k: keys[keys.length - 1], v: parseFloat(weightData[keys[keys.length - 1]]) } : null;
}
function renderWeight() {
  document.getElementById('weightCard').style.display = prefs.weight ? '' : 'none';
  document.getElementById('weightInput').value = weightData[todayKey()] || '';
  updateWeightDiff();
}
function updateWeightDiff() {
  const diff = document.getElementById('weightDiff');
  const cur = parseFloat(weightData[todayKey()]);
  const prev = prevWeightEntry(todayKey());
  diff.className = 'weight-diff';
  if (cur > 0 && prev) {
    const d = cur - prev.v;
    if (Math.abs(d) < 0.05) { diff.textContent = `前回と同じ (${fmtDateShort(prev.k)})`; }
    else {
      diff.textContent = `前回比 ${d > 0 ? '+' : ''}${d.toFixed(1)}kg (${fmtDateShort(prev.k)})`;
      diff.classList.add(d > 0 ? 'up' : 'down');
    }
  } else if (prev) {
    diff.textContent = `前回: ${prev.v}kg (${fmtDateShort(prev.k)})`;
  } else {
    diff.textContent = '';
  }
}

// ---- 今日のトレーニング ----
function addExercise(name) {
  name = name.trim();
  if (!name) return;
  todayList().push({ id: uid(), name, done: false, sets: [{ w: '', r: '' }] });
  save(); renderToday();
}
function renderTemplates() {
  const c = document.getElementById('templates');
  c.style.display = prefs.templates && templates.length ? '' : 'none';
  c.innerHTML = '';
  templates.forEach(tpl => {
    const b = document.createElement('button');
    b.textContent = '＋ ' + tpl.name;
    b.onclick = () => {
      tpl.ex.forEach(n => todayList().push({ id: uid(), name: n, done: false, sets: [{ w: '', r: '' }] }));
      save(); renderToday(); toast(tpl.name + ' を追加しました');
    };
    c.appendChild(b);
  });
}
function renderToday() {
  const list = todayList();
  const box = document.getElementById('exList');
  box.innerHTML = '';
  if (list.length === 0) {
    box.innerHTML = '<div class="empty"><div class="big">🌱</div>今日のメニューを追加しよう</div>';
    return;
  }
  list.forEach(ex => {
    const el = document.createElement('div');
    el.className = 'exercise' + (ex.done ? ' done' : '');
    const vol = exVolume(ex);

    const head = document.createElement('div');
    head.className = 'ex-head';
    head.innerHTML = `
      <div class="ex-check">${ex.done ? '✓' : ''}</div>
      <div class="ex-title">${escapeHtml(ex.name)}<div class="ex-sub">${ex.sets.length}セット${vol ? ' ・ ' + vol.toLocaleString() + 'kg' : ''}</div></div>
      <div class="ex-del">✕</div>`;
    head.querySelector('.ex-check').onclick = (e) => { e.stopPropagation(); ex.done = !ex.done; save(); renderToday(); };
    head.querySelector('.ex-del').onclick = (e) => {
      e.stopPropagation();
      armDelete(e.target, () => { data[todayKey()] = todayList().filter(x => x.id !== ex.id); save(); renderToday(); });
    };
    el.appendChild(head);

    const sets = document.createElement('div');
    sets.className = 'sets';
    sets.innerHTML = '<div class="set-labels"><span>#</span><span>重量(kg)</span><span>回数(rep)</span><span></span></div>';
    ex.sets.forEach((set, i) => {
      const row = document.createElement('div');
      row.className = 'set-row';
      row.innerHTML = `
        <div class="set-num">${i + 1}</div>
        <input type="number" inputmode="decimal" placeholder="0" value="${set.w}">
        <input type="number" inputmode="numeric" placeholder="0" value="${set.r}">
        <div class="set-del">✕</div>`;
      const [wIn, rIn] = row.querySelectorAll('input');
      wIn.oninput = () => { set.w = wIn.value; save(); updateSub(el, ex); };
      rIn.oninput = () => { set.r = rIn.value; save(); updateSub(el, ex); };
      row.querySelector('.set-del').onclick = () => {
        if (ex.sets.length === 1) { ex.sets[0] = { w: '', r: '' }; } else { ex.sets.splice(i, 1); }
        save(); renderToday();
      };
      sets.appendChild(row);
    });
    const addSetBtn = document.createElement('button');
    addSetBtn.className = 'btn-set';
    addSetBtn.textContent = '＋ セットを追加';
    addSetBtn.onclick = () => {
      const last = ex.sets[ex.sets.length - 1];
      ex.sets.push({ w: last ? last.w : '', r: last ? last.r : '' });
      save(); renderToday();
    };
    sets.appendChild(addSetBtn);
    el.appendChild(sets);
    box.appendChild(el);
  });
}
function updateSub(el, ex) {
  const vol = exVolume(ex);
  el.querySelector('.ex-sub').textContent = `${ex.sets.length}セット${vol ? ' ・ ' + vol.toLocaleString() + 'kg' : ''}`;
}

// ---- 記録・履歴 ----
function hasRecord(k) {
  return (data[k] || []).length > 0 || parseFloat(weightData[k]) > 0;
}
function calcStreak() {
  let streak = 0;
  const d = new Date();
  if (!hasRecord(dateKey(d))) d.setDate(d.getDate() - 1); // 今日が未記録でも昨日までの連続を表示
  while (hasRecord(dateKey(d))) { streak++; d.setDate(d.getDate() - 1); }
  return streak;
}
function renderHistory() {
  const days = [...new Set([
    ...Object.keys(data).filter(k => data[k].length > 0),
    ...Object.keys(weightData).filter(k => parseFloat(weightData[k]) > 0)
  ])].sort().reverse();

  const workoutDays = days.filter(d => (data[d] || []).length > 0);
  let totalVol = 0;
  workoutDays.forEach(d => data[d].forEach(ex => { totalVol += exVolume(ex); }));
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat"><div class="num">${workoutDays.length}</div><div class="lbl">トレ日数</div></div>
    <div class="stat"><div class="num">${calcStreak()}</div><div class="lbl">連続記録</div></div>
    <div class="stat"><div class="num">${(totalVol / 1000).toFixed(1)}t</div><div class="lbl">総挙上量</div></div>`;

  const box = document.getElementById('histList');
  if (days.length === 0) { box.innerHTML = '<div class="empty"><div class="big">📋</div>まだ記録がありません</div>'; return; }
  box.innerHTML = '';
  days.forEach(d => {
    const card = document.createElement('div');
    card.className = 'card hist-day';
    const exList = data[d] || [];
    const dayVol = exList.reduce((s, ex) => s + exVolume(ex), 0);
    const w = parseFloat(weightData[d]) > 0 ? parseFloat(weightData[d]) : null;
    const right = [w ? '⚖️ ' + w + 'kg' : '', dayVol ? dayVol.toLocaleString() + 'kg' : ''].filter(Boolean).join(' ・ ');
    let inner = `<div class="hist-date"><span>${fmtDate(d)}</span><span>${right}</span></div>`;
    exList.forEach(ex => {
      const setsTxt = ex.sets.filter(s => s.w || s.r).map(s => `${s.w || 0}×${s.r || 0}`).join(', ') || '記録なし';
      inner += `<div class="hist-ex">${ex.done ? '✅ ' : ''}${escapeHtml(ex.name)}<div class="sets-txt">${setsTxt}</div></div>`;
    });
    if (exList.length === 0) inner += `<div class="hist-ex sets-txt" style="color:var(--muted)">体重のみ記録</div>`;
    card.innerHTML = inner;
    box.appendChild(card);
  });
}

// ---- 統計 ----
function renderWeightChart() {
  const el = document.getElementById('weightChart');
  const entries = Object.keys(weightData)
    .filter(k => parseFloat(weightData[k]) > 0)
    .sort()
    .map(k => ({ k, v: parseFloat(weightData[k]) }))
    .slice(-14);
  if (entries.length === 0) {
    el.innerHTML = '<div class="empty" style="padding:20px">「今日」タブで体重を入力すると表示されます</div>';
    return;
  }
  const vals = entries.map(e => e.v);
  let min = Math.min(...vals), max = Math.max(...vals);
  if (goal) { min = Math.min(min, goal.target); max = Math.max(max, goal.target); } // 目標ラインを描画範囲に含める
  const pad = (max - min) * 0.25 || 0.5;
  const lo = min - pad, hi = max + pad;
  const W = 320, H = 130, mL = 6, mR = 6, mT = 16, mB = 20;
  const x = i => entries.length === 1 ? W / 2 : mL + i * (W - mL - mR) / (entries.length - 1);
  const y = v => mT + (1 - (v - lo) / (hi - lo)) * (H - mT - mB);
  const pts = entries.map((e, i) => `${x(i).toFixed(1)},${y(e.v).toFixed(1)}`).join(' ');
  const dots = entries.map((e, i) =>
    `<circle cx="${x(i).toFixed(1)}" cy="${y(e.v).toFixed(1)}" r="3.5" fill="var(--blue)"/>`).join('');
  const first = entries[0], last = entries[entries.length - 1];
  const diff = last.v - first.v;
  const goalLine = goal ? `
      <line x1="0" y1="${y(goal.target).toFixed(1)}" x2="${W}" y2="${y(goal.target).toFixed(1)}"
        stroke="var(--green)" stroke-width="1.5" stroke-dasharray="5 4" opacity=".7"/>
      <text x="${W - 4}" y="${(y(goal.target) - 5).toFixed(1)}" font-size="10" fill="var(--green)" text-anchor="end">目標 ${goal.target}kg</text>` : '';
  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
      <span style="font-size:22px;font-weight:700;color:var(--blue)">${last.v}kg</span>
      <span style="font-size:12px;color:${diff <= 0 ? 'var(--green)' : 'var(--accent)'}">
        期間内 ${diff > 0 ? '+' : ''}${diff.toFixed(1)}kg</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">
      ${goalLine}
      <polyline points="${pts}" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
      ${entries.length === 1 ? `
      <text x="${x(0)}" y="${H - 4}" font-size="10" fill="var(--muted)" text-anchor="middle">${fmtDateShort(first.k)}</text>
      <text x="${x(0)}" y="${y(first.v) - 8}" font-size="10" fill="var(--text)" text-anchor="middle">${first.v}</text>` : `
      <text x="${x(0)}" y="${H - 4}" font-size="10" fill="var(--muted)" text-anchor="start">${fmtDateShort(first.k)}</text>
      <text x="${x(entries.length - 1)}" y="${H - 4}" font-size="10" fill="var(--muted)" text-anchor="end">${fmtDateShort(last.k)}</text>
      <text x="${x(0)}" y="${y(first.v) - 8}" font-size="10" fill="var(--text)" text-anchor="start">${first.v}</text>
      <text x="${x(entries.length - 1)}" y="${y(last.v) - 8}" font-size="10" fill="var(--text)" text-anchor="end">${last.v}</text>`}
    </svg>`;
}
function renderStats() {
  renderWeightChart();

  const chart = document.getElementById('volumeChart');
  const labels = [], vols = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const k = dateKey(d);
    labels.push(fmtDateShort(k));
    vols.push((data[k] || []).reduce((s, ex) => s + exVolume(ex), 0));
  }
  const max = Math.max(...vols, 1);
  chart.innerHTML = vols.map((v, i) => `
    <div class="bar-row">
      <div class="bar-label">${labels[i]}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(v / max * 100)}%"></div></div>
      <div class="bar-val">${v ? v.toLocaleString() : '-'}</div>
    </div>`).join('');

  const best = {};
  Object.values(data).flat().forEach(ex => {
    ex.sets.forEach(s => {
      const w = parseFloat(s.w) || 0;
      if (w > 0 && (!best[ex.name] || w > best[ex.name].w)) best[ex.name] = { w, r: parseFloat(s.r) || 0 };
    });
  });
  const pr = document.getElementById('prList');
  const names = Object.keys(best).sort((a, b) => best[b].w - best[a].w);
  if (names.length === 0) { pr.innerHTML = '<div class="empty" style="padding:20px">記録を入力すると表示されます</div>'; return; }
  pr.innerHTML = names.map(n => `
    <div class="hist-ex" style="display:flex;justify-content:space-between">
      <span>${escapeHtml(n)}</span>
      <span style="color:var(--accent);font-weight:600">${best[n].w}kg × ${best[n].r}</span>
    </div>`).join('');
}

// ---- 設定 ----
function renderSettings() {
  // 目標
  const lw = latestWeight();
  document.getElementById('goalStart').value = goal ? goal.start : (lw ? lw.v : '');
  document.getElementById('goalTarget').value = goal ? goal.target : '';
  if (goal) {
    document.getElementById('goalDate').value = goal.date;
  } else {
    const d = new Date(); d.setMonth(d.getMonth() + 3); // デフォルト3ヶ月後
    document.getElementById('goalDate').value = dateKey(d);
  }
  document.getElementById('goalDelete').style.display = goal ? '' : 'none';

  // テンプレート
  const list = document.getElementById('tplList');
  list.innerHTML = templates.length ? '' : '<div class="empty" style="padding:14px">メニューはまだありません</div>';
  templates.forEach((tpl, i) => {
    const row = document.createElement('div');
    row.className = 'tpl-item';
    row.innerHTML = `<span class="tpl-name">${escapeHtml(tpl.name)}</span><span class="tpl-ex">${escapeHtml(tpl.ex.join(', '))}</span><span class="tpl-del">✕</span>`;
    row.querySelector('.tpl-del').onclick = (e) => {
      armDelete(e.target, () => {
        templates.splice(i, 1); persist('templates_v1', templates);
        renderSettings(); renderTemplates();
      });
    };
    list.appendChild(row);
  });

  // 表示トグル
  document.getElementById('prefWeight').checked = prefs.weight;
  document.getElementById('prefTemplates').checked = prefs.templates;
  document.getElementById('prefGoal').checked = prefs.goal;
}

function savePrefs() {
  persist('prefs_v1', prefs);
  renderWeight(); renderTemplates(); renderGoalCard();
}

// ---- エクスポート ----
function csvField(s) {
  s = String(s ?? '');
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}
function downloadFile(filename, content, mime) {
  try {
    const blob = new Blob([content], { type: mime });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    return true;
  } catch (e) { return false; }
}
function exportCSV() {
  const rows = [['日付', '種別', '種目', 'セット', '重量kg', '回数', 'ボリュームkg']];
  const days = [...new Set([...Object.keys(data), ...Object.keys(weightData)])].sort();
  days.forEach(d => {
    if (parseFloat(weightData[d]) > 0) rows.push([d, '体重', '', '', weightData[d], '', '']);
    (data[d] || []).forEach(ex => {
      ex.sets.forEach((s, i) => {
        if (!s.w && !s.r) return;
        const vol = (parseFloat(s.w) || 0) * (parseFloat(s.r) || 0);
        rows.push([d, '筋トレ', ex.name, i + 1, s.w || 0, s.r || 0, vol || '']);
      });
    });
  });
  if (rows.length === 1) { toast('まだ記録がありません'); return; }
  const csv = '﻿' + rows.map(r => r.map(csvField).join(',')).join('\r\n');
  if (downloadFile(`workout-data-${todayKey()}.csv`, csv, 'text/csv')) toast('CSVをダウンロードしました');
  else toast('この環境ではダウンロードできません');
}
function buildReport() {
  const days = [...new Set([
    ...Object.keys(data).filter(k => data[k].length > 0),
    ...Object.keys(weightData).filter(k => parseFloat(weightData[k]) > 0)
  ])].sort();
  const wKeys = Object.keys(weightData).filter(k => parseFloat(weightData[k]) > 0).sort();
  const lines = ['📊 トレーニング進捗レポート'];
  if (days.length) lines.push(`期間: ${fmtDateShort(days[0])} 〜 ${fmtDateShort(days[days.length - 1])} (記録 ${days.length}日)`);
  if (wKeys.length >= 1) {
    const w0 = parseFloat(weightData[wKeys[0]]), w1 = parseFloat(weightData[wKeys[wKeys.length - 1]]);
    const d = w1 - w0;
    lines.push(`体重: ${w0}kg → ${w1}kg (${d > 0 ? '+' : ''}${d.toFixed(1)}kg)`);
  }
  if (goal) lines.push(`目標: ${goal.target}kg (期限 ${goal.date})`);
  const workoutDays = days.filter(d => (data[d] || []).length > 0);
  let totalVol = 0;
  workoutDays.forEach(d => data[d].forEach(ex => { totalVol += exVolume(ex); }));
  lines.push(`トレーニング: ${workoutDays.length}回 ・ 総挙上量 ${(totalVol / 1000).toFixed(1)}t ・ 連続記録 ${calcStreak()}日`);
  const best = {};
  Object.values(data).flat().forEach(ex => ex.sets.forEach(s => {
    const w = parseFloat(s.w) || 0;
    if (w > 0 && (!best[ex.name] || w > best[ex.name])) best[ex.name] = w;
  }));
  const top = Object.keys(best).sort((a, b) => best[b] - best[a]).slice(0, 3);
  if (top.length) lines.push('ベスト: ' + top.map(n => `${n} ${best[n]}kg`).join(' / '));
  lines.push('— WORKOUT LOGLOG で記録');
  return lines.join('\n');
}
async function copyReport() {
  const txt = buildReport();
  try {
    await navigator.clipboard.writeText(txt);
    toast('レポートをコピーしました');
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); toast('レポートをコピーしました'); }
    catch (e2) { toast('コピーできませんでした'); }
    ta.remove();
  }
}
function exportJSON() {
  const backup = { app: 'workout-tracker', version: 1, exported: new Date().toISOString(), workout: data, weight: weightData, goal, templates, prefs };
  if (downloadFile(`workout-backup-${todayKey()}.json`, JSON.stringify(backup, null, 2), 'application/json')) toast('バックアップを保存しました');
  else toast('この環境ではダウンロードできません');
}
function importJSON(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const b = JSON.parse(reader.result);
      if (!b || typeof b.workout !== 'object' || typeof b.weight !== 'object') throw new Error('bad format');
      data = b.workout || {}; weightData = b.weight || {};
      goal = b.goal || null;
      templates = Array.isArray(b.templates) ? b.templates : templates;
      prefs = Object.assign({ weight: true, templates: true, goal: true }, b.prefs);
      save(); saveWeight(); persist('goal_v1', goal); persist('templates_v1', templates); persist('prefs_v1', prefs);
      renderAll(); toast('復元しました');
    } catch (e) { toast('ファイルを読み込めませんでした'); }
  };
  reader.readAsText(file);
}
function wipeAll() {
  data = {}; weightData = {}; goal = null;
  templates = JSON.parse(JSON.stringify(DEFAULT_TEMPLATES));
  prefs = { weight: true, templates: true, goal: true };
  save(); saveWeight(); persist('goal_v1', goal); persist('templates_v1', templates); persist('prefs_v1', prefs);
  renderAll(); toast('全データを削除しました');
}

// ---- render all / tabs ----
function renderAll() {
  document.getElementById('todayLabel').textContent = fmtDate(todayKey());
  renderGoalCard(); renderWeight(); renderTemplates(); renderToday();
  const active = document.querySelector('nav button.active').dataset.tab;
  if (active === 'history') renderHistory();
  if (active === 'stats') renderStats();
  if (active === 'settings') renderSettings();
}
document.querySelectorAll('nav button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'today') { renderGoalCard(); renderWeight(); renderToday(); }
    if (tab === 'history') renderHistory();
    if (tab === 'stats') renderStats();
    if (tab === 'settings') renderSettings();
  };
});

// ---- events ----
document.getElementById('addExBtn').onclick = () => {
  const inp = document.getElementById('exInput');
  addExercise(inp.value); inp.value = ''; inp.focus();
};
document.getElementById('exInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { addExercise(e.target.value); e.target.value = ''; }
});
document.getElementById('weightInput').addEventListener('input', e => {
  const v = e.target.value;
  if (v === '' || !(parseFloat(v) > 0)) { delete weightData[todayKey()]; }
  else { weightData[todayKey()] = v; }
  saveWeight(); updateWeightDiff(); renderGoalCard();
});

document.getElementById('goalSave').onclick = () => {
  const start = parseFloat(document.getElementById('goalStart').value);
  const target = parseFloat(document.getElementById('goalTarget').value);
  const date = document.getElementById('goalDate').value;
  if (!(start > 0) || !(target > 0) || !date) { toast('開始体重・目標体重・期限を入力してください'); return; }
  goal = { start, target, date, set: todayKey() };
  persist('goal_v1', goal);
  renderSettings(); renderGoalCard();
  toast('目標を保存しました');
};
document.getElementById('goalDelete').onclick = (e) => {
  armDelete(e.target, () => {
    goal = null; persist('goal_v1', goal);
    renderSettings(); renderGoalCard();
    toast('目標を削除しました');
  });
};

document.getElementById('tplAdd').onclick = () => {
  const name = document.getElementById('tplName').value.trim();
  const ex = document.getElementById('tplExercises').value.split(/[,、，]/).map(s => s.trim()).filter(Boolean);
  if (!name || ex.length === 0) { toast('メニュー名と種目を入力してください'); return; }
  templates.push({ name, ex });
  persist('templates_v1', templates);
  document.getElementById('tplName').value = '';
  document.getElementById('tplExercises').value = '';
  renderSettings(); renderTemplates();
  toast('メニューを追加しました');
};

document.getElementById('prefWeight').onchange = e => { prefs.weight = e.target.checked; savePrefs(); };
document.getElementById('prefTemplates').onchange = e => { prefs.templates = e.target.checked; savePrefs(); };
document.getElementById('prefGoal').onchange = e => { prefs.goal = e.target.checked; savePrefs(); };

document.getElementById('expCsv').onclick = exportCSV;
document.getElementById('expReport').onclick = copyReport;
document.getElementById('expJson').onclick = exportJSON;
document.getElementById('impJson').onclick = () => document.getElementById('impFile').click();
document.getElementById('impFile').addEventListener('change', e => {
  if (e.target.files[0]) importJSON(e.target.files[0]);
  e.target.value = '';
});
document.getElementById('wipeAll').onclick = (e) => armDelete(e.target, wipeAll);

// ---- 日付変更の検知 (開きっぱなし・翌日再表示に対応) ----
let shownKey = todayKey();
function refreshIfDateChanged() {
  if (todayKey() === shownKey) return;
  shownKey = todayKey();
  renderAll();
}
setInterval(refreshIfDateChanged, 30000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) refreshIfDateChanged(); });

// ---- init ----
renderAll();

// PWA: オフライン対応 (https か localhost でのみ動作)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
